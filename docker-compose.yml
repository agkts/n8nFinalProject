version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    restart: always
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=${N8N_BASE_URL}/
      - GENERIC_TIMEZONE=${TIMEZONE:-Europe/Istanbul}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
    expose:
      - "5678"
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - N8N_BASE_URL=${N8N_BASE_URL}
    expose:
      - "80"
    depends_on:
      - n8n
    networks:
      - app_network

volumes:
  n8n_data:

networks:
  app_network:
    driver: bridge
